<!doctype html>
<html lang="en">

<head>
  {{mainscript}}
  <style>
    :root {
      background-color: black;
      color: white;
      font-family: system-ui, sans-serif;
    }

    #h {
      position: fixed;
      width: 100% !important;
      width: 100vw !important;
      width: 100dvw !important;
      height: 100% !important;
      height: 100vh !important;
      height: 100dvh !important;
    }

    #l {
      display: flex;
      flex-direction: column;
      position: fixed;
      inset: 0;
      z-index: 1;
      text-align: center;
      justify-content: center;
      align-items: center;
    }

    #p {
      width: 80%;
      width: 80vw;
      width: 80dvw;
    }
  </style>
  <noscript>
    <style>
      #t,
      #p {
        display: none;
      }
    </style>
  </noscript>
</head>

<body style="margin: 0px;">
  <div id="l">
    <noscript>
      JavaScript is disabled or unsupported.
      This site cannot function without it.
    </noscript>
    <pre id="t">Loading JavaScript...</pre>
    <progress id="p"></progress>
  </div>
  <canvas id="h" aria-busy="true" aria-describedby="p"></canvas>
</body>

</html>
